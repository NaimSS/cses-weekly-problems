<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSES Weekly Picks · Rankings</title>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --text:       #e8eaf0;
      --muted:      #6b7280;
      --hard:       #ef4444;
      --hard-dim:   #3b1515;
      --medium:     #f59e0b;
      --medium-dim: #3b2a0a;
      --easy:       #22c55e;
      --easy-dim:   #0d2e18;
      --accent:     #6366f1;
      --radius:     12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    /* ── nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 860px;
      margin: 0 auto 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .nav-back {
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-rank {
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-rank:hover { color: var(--accent); }
    .nav-date {
      font-size: .85rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .logo svg { opacity: .5; }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.1;
    }
    h1 span { color: var(--accent); }

    /* ── auth ── */
    .auth-area {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .82rem;
      color: var(--muted);
    }
    .auth-area img { border-radius: 50%; vertical-align: middle; }
    .login-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: .82rem;
      padding: .3rem .75rem;
      transition: border-color .15s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .login-btn:hover { border-color: var(--accent); }
    .login-btn svg { opacity: .7; }
    .signout-link {
      cursor: pointer;
      color: var(--muted);
      text-decoration: underline;
      background: none;
      border: none;
      font-size: .82rem;
      padding: 0;
    }
    .signout-link:hover { color: var(--text); }

    /* ── footer ── */
    footer {
      text-align: center;
      margin-top: 4rem;
      font-size: .78rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }


    .subtitle {
      margin-top: .6rem;
      color: var(--muted);
      font-size: .9rem;
    }

    /* ── rank table ── */
    .rank-section {
      max-width: 1000px;
      margin: 0 auto;
    }
    .table-wrap { overflow-x: auto; }

    .rank-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    .rank-table th, .rank-table td {
      padding: .6rem .9rem;
      border: 1px solid var(--border);
      text-align: center;
      white-space: nowrap;
    }
    .rank-table th:first-child, .rank-table td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: var(--bg);
      z-index: 1;
    }
    .rank-table thead th {
      background: var(--surface);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }
    .rank-table thead th:first-child {
      background: var(--surface);
    }
    .rank-table tbody tr:hover td {
      background: var(--surface);
    }
    .rank-table tbody tr:hover td:first-child {
      background: var(--surface);
    }

    .rank-avatar {
      border-radius: 50%;
      vertical-align: middle;
      margin-right: .4rem;
    }

    /* cell colour coding */
    .cell-high  { background: var(--easy-dim);   color: var(--easy);   font-weight: 700; }
    .cell-mid   { background: var(--medium-dim); color: var(--medium); font-weight: 700; }
    .cell-total { font-weight: 700; font-size: 1rem; border-left: 2px solid var(--accent); }

    .week-link { color: inherit; text-decoration: none; }
    .week-link:hover { color: var(--accent); text-decoration: underline; }

    .week-summary { cursor: pointer; user-select: none; }
    .week-summary:hover { color: var(--accent); }
    .expand-icon { font-size: .7rem; margin-left: .3rem; opacity: .6; vertical-align: middle; }
    .week-prob { font-size: .8rem; padding: .4rem .45rem !important; min-width: 2rem; }
    .prob-hard   { color: var(--hard);   }
    .prob-medium { color: var(--medium); }
    .prob-easy   { color: var(--easy);   }
    .cell-done { color: var(--easy); font-weight: 700; }
    .cell-miss { color: var(--muted); opacity: .4; }
    .sf { font-size: .75rem; opacity: .6; }

    .no-sb, .no-data, .loading-msg {
      color: var(--muted);
      text-align: center;
      padding: 3rem 1rem;
      font-size: .9rem;
    }

    .legend {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .78rem;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }
  </style>
</head>

    async function loadAllRankings() {
      const container = document.getElementById('rank-container');
      if (!USE_SUPABASE || !sb) {
        container.innerHTML = '<p class="no-sb">Rankings not available.</p>';
        return;
      }

      // weeks newest-first
      const weeks = Object.keys(ALL_WEEKS).sort().reverse();
      if (weeks.length === 0) {
        container.innerHTML = '<p class="no-data">No weeks generated yet.</p>';
        return;
      }

      // collect all problem IDs
      const allIds = [];
      for (const w of weeks) {
        const wd = ALL_WEEKS[w];
        allIds.push(...wd.hard.map(p => p.id), ...wd.medium.map(p => p.id), ...wd.easy.map(p => p.id));
      }

      const [progressRes, profilesRes] = await Promise.all([
        sb.from('progress').select('user_id, problem_id').in('problem_id', allIds).eq('done', true),
        sb.from('profiles').select('user_id, username, avatar_url'),
      ]);

      const progress = progressRes.data || [];
      const profiles = profilesRes.data || [];

      const userMap = new Map();
      for (const p of profiles) {
        userMap.set(p.user_id, { username: p.username || 'Anonymous', avatar: p.avatar_url, solved: new Set() });
      }
      for (const row of progress) {
        if (!userMap.has(row.user_id)) {
          userMap.set(row.user_id, { username: 'Unknown', avatar: null, solved: new Set() });
        }
        userMap.get(row.user_id).solved.add(row.problem_id);
      }

      if (userMap.size === 0) {
        container.innerHTML = '<p class="no-data">No progress yet — sign in and mark problems done on weekly pages!</p>';
        return;
      }

      // week problem sets
      const weekSets = {};
      const weekProbs = {};
      for (const w of weeks) {
        const wd = ALL_WEEKS[w];
        weekSets[w] = new Set([...wd.hard.map(p => p.id), ...wd.medium.map(p => p.id), ...wd.easy.map(p => p.id)]);
        weekProbs[w] = [
          ...wd.hard.map((p, i) => ({ ...p, tier: 'hard', lbl: 'H' + (i+1) })),
          ...wd.medium.map((p, i) => ({ ...p, tier: 'medium', lbl: 'M' + (i+1) })),
          ...wd.easy.map((p, i) => ({ ...p, tier: 'easy', lbl: 'E' + (i+1) })),
        ];
      }

      // sort users by total solved descending
      const users = [...userMap.entries()].sort((a, b) => b[1].solved.size - a[1].solved.size);

      // build table
      let head = `<tr><th>User</th>`;
      for (const w of weeks) {
        const d = new Date(w + 'T12:00:00');
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        head += `<th class="week-summary" data-week="${w}" onclick="toggleWeek('${w}')">`
              + `<a class="week-link" href="weeks/${w}.html" onclick="event.stopPropagation()">${label}</a>`
              + `<span class="expand-icon">▶</span></th>`;
        for (const p of weekProbs[w]) {
          head += `<th class="week-prob prob-${p.tier}" data-week="${w}" style="display:none" title="${p.name}">${p.lbl}</th>`;
        }
      }
      head += `<th class="cell-total">Total</th></tr>`;

      let body = '';
      for (const [, u] of users) {
        const av = u.avatar ? `<img class="rank-avatar" src="${u.avatar}" width="20" height="20" alt="">` : '';
        body += `<tr><td>${av}${u.username}</td>`;
        let total = 0;
        for (const w of weeks) {
          const wps = weekSets[w];
          const count = [...wps].filter(id => u.solved.has(id)).length;
          const pct   = count / wps.size;
          total += count;
          let cls = '';
          if (pct >= 0.75)  cls = 'cell-high';
          else if (count > 0) cls = 'cell-mid';
          body += `<td class="week-summary ${cls}" data-week="${w}">${count > 0 ? count + '<span class="sf">/' + wps.size + '</span>' : '—'}</td>`;
          for (const p of weekProbs[w]) {
            const done = u.solved.has(p.id);
            body += `<td class="week-prob ${done ? 'cell-done' : 'cell-miss'}" data-week="${w}" style="display:none">${done ? '✓' : '✗'}</td>`;
          }
        }
        body += `<td class="cell-total">${total}</td></tr>`;
      }

      container.innerHTML = `
        <div class="rank-section">
          <div class="table-wrap">
            <table class="rank-table">
              <thead>${head}</thead>
              <tbody>${body}</tbody>
            </table>
          </div>
        </div>`;
    }

    // ── Week expand/collapse ──────────────────────────────────────────────────
    function toggleWeek(week) {
      const summaries = document.querySelectorAll(`.week-summary[data-week="${week}"]`);
      const probs     = document.querySelectorAll(`.week-prob[data-week="${week}"]`);
      const expand    = probs[0].style.display === 'none';
      summaries.forEach(el => el.style.display = expand ? 'none' : '');
      probs.forEach(el     => el.style.display = expand ? ''     : 'none');
      const icon = document.querySelector(`th.week-summary[data-week="${week}"] .expand-icon`);
      if (icon) icon.textContent = expand ? '▼' : '▶';
    }

    // ── Auth ──────────────────────────────────────────────────────────────────

    async function signIn() {
      await sb.auth.signInWithOAuth({
        provider: 'github',
        options: { redirectTo: window.location.href }
      });
    }

    async function signOut() {
      await sb.auth.signOut();
      currentUser = null;
      renderAuth(null);
      document.querySelectorAll('.card[data-id]').forEach(c => c.classList.remove('done'));
      loadLocal();
    }

    function renderAuth(user) {
      const area = document.getElementById('auth-area');
      if (!USE_SUPABASE) { area.innerHTML = ''; return; }
      if (user) {
        const name   = user.user_metadata?.user_name || user.email;
        const avatar = user.user_metadata?.avatar_url;
        area.innerHTML = `
          ${avatar ? `<img src="${avatar}" width="22" height="22" alt="">` : ''}
          <span>${name}</span>
          <button class="signout-link" onclick="signOut()">Sign out</button>`;
      } else {
        area.innerHTML = `
          <button class="login-btn" onclick="signIn()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
              0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756
              -1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834
              2.807 1.304 3.492.997.108-.775.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93
              0-1.31.468-2.38 1.235-3.22-.124-.303-.535-1.523.117-3.176 0 0 1.008-.322 3.3 1.23
              .96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23
              .655 1.653.243 2.873.12 3.176.77.84 1.233 1.91 1.233 3.22 0 4.61-2.807 5.625
              -5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .322.216.694
              .825.576C20.565 21.796 24 17.298 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            Sign in with GitHub
          </button>`;
      }
    }


    // ── Boot ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      if (!USE_SUPABASE) {
        renderAuth(null);
        loadAllRankings();
        return;
      }

      renderAuth(null);

      const { data: { session } } = await sb.auth.getSession();
      currentUser = session?.user ?? null;
      renderAuth(currentUser);
      loadAllRankings();

      sb.auth.onAuthStateChange(async (event, session) => {
        currentUser = session?.user ?? null;
        renderAuth(currentUser);
      });
    });
  </script>
