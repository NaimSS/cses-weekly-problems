<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSES Weekly Picks</title>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --text:       #e8eaf0;
      --muted:      #6b7280;
      --hard:       #ef4444;
      --hard-dim:   #3b1515;
      --medium:     #f59e0b;
      --medium-dim: #3b2a0a;
      --easy:       #22c55e;
      --easy-dim:   #0d2e18;
      --accent:     #6366f1;
      --radius:     12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    /* ── nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 860px;
      margin: 0 auto 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .nav-back {
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-rank {
      font-size: .85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-rank:hover { color: var(--accent); }
    .nav-date {
      font-size: .85rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .logo svg { opacity: .5; }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.1;
    }
    h1 span { color: var(--accent); }

    /* ── auth ── */
    .auth-area {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .82rem;
      color: var(--muted);
    }
    .auth-area img { border-radius: 50%; vertical-align: middle; }
    .login-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: .82rem;
      padding: .3rem .75rem;
      transition: border-color .15s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .login-btn:hover { border-color: var(--accent); }
    .login-btn svg { opacity: .7; }
    .signout-link {
      cursor: pointer;
      color: var(--muted);
      text-decoration: underline;
      background: none;
      border: none;
      font-size: .82rem;
      padding: 0;
    }
    .signout-link:hover { color: var(--text); }

    /* ── footer ── */
    footer {
      text-align: center;
      margin-top: 4rem;
      font-size: .78rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }


    .subtitle {
      margin-top: .6rem;
      color: var(--muted);
      font-size: .9rem;
    }

    .top-links {
      display: flex;
      justify-content: center;
      gap: .75rem;
      margin-bottom: 2.5rem;
    }
    .rank-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .55rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .88rem;
      font-weight: 600;
      text-decoration: none;
      transition: border-color .15s, transform .1s;
    }
    .rank-btn:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .weeks-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    .week-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, transform .15s, box-shadow .15s;
    }
    .week-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .week-date { font-size: 1rem; font-weight: 600; }
    .week-arrow { color: var(--muted); font-size: .9rem; }
  </style>
</head>
