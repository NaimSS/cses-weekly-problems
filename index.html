<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSES Weekly Picks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --text:       #e8eaf0;
      --muted:      #6b7280;
      --accent:     #6366f1;
      --radius:     12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .logo svg { opacity: .5; }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -.02em;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      margin-top: .6rem;
      color: var(--muted);
      font-size: .9rem;
    }

    .weeks-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .week-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, transform .15s, box-shadow .15s;
    }
    .week-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .week-date {
      font-size: 1rem;
      font-weight: 600;
    }
    .week-arrow {
      color: var(--muted);
      font-size: .9rem;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      font-size: .78rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      CSES Problem Set
    </div>
    <h1>Weekly <span>Practice</span> Picks</h1>
    <p class="subtitle">Select a week to view its problems</p>
  </header>

  <div class="weeks-list">
    
        <a class="week-card" href="weeks/2026-03-15.html">
          <span class="week-date">March 15, 2026</span>
          <span class="week-arrow">→</span>
        </a>
  </div>

  <footer>
    Generated from <a href="https://cses.fi/problemset/" target="_blank">cses.fi/problemset</a> · ranked by solve count
  </footer>
</body>
</html>
